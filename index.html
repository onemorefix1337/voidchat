<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>void.chat</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;700&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

:root {
  --bg:       #080810;
  --bg2:      #0d0d18;
  --bg3:      #111120;
  --bg4:      #161628;
  --border:   #1c1c30;
  --border2:  #242438;
  --acc:      #6366f1;
  --acc2:     #818cf8;
  --acc-dim:  rgba(99,102,241,.12);
  --acc-glow: rgba(99,102,241,.25);
  --text:     #a8a8c0;
  --text-dim: #44445a;
  --text-hi:  #e0e0f0;
  --green:    #34d399;
  --red:      #f87171;
  --yellow:   #fbbf24;
  --pink:     #f472b6;
  --voice-bg: rgba(52,211,153,.07);
  --voice-border: rgba(52,211,153,.2);
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: var(--mono);
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
}

/* ─── SETUP ──────────────────────────────────────── */
#setup {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
}

.setup-wrap {
  width: 420px;
  display: flex; flex-direction: column; gap: 0;
}

.setup-logo {
  font-size: 28px; font-weight: 700; color: var(--text-hi);
  letter-spacing: -1px; margin-bottom: 4px;
}
.setup-logo span { color: var(--acc2); }

.setup-tagline {
  font-size: 11px; color: var(--text-dim);
  letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 36px;
}

.setup-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 32px 36px;
  position: relative;
}
.setup-card::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--acc), transparent);
}

.field-label {
  font-size: 10px; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 2px;
  margin-bottom: 8px;
}

.field-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text-hi);
  font-family: var(--mono);
  font-size: 14px;
  padding: 11px 14px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  margin-bottom: 20px;
}
.field-input:focus {
  border-color: var(--acc);
  box-shadow: 0 0 0 3px var(--acc-dim);
}
.field-input::placeholder { color: var(--text-dim); }

.role-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  margin-bottom: 24px;
}
.role-opt {
  background: var(--bg3);
  border: 1px solid var(--border);
  padding: 10px 14px;
  cursor: pointer;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-dim);
  transition: all .15s;
  text-align: left;
  display: flex; align-items: center; gap: 8px;
}
.role-opt:hover { border-color: var(--border2); color: var(--text); }
.role-opt.selected {
  border-color: var(--acc);
  color: var(--acc2);
  background: var(--acc-dim);
}
.role-dot { width: 6px; height: 6px; border-radius: 50%; }

.btn-primary {
  width: 100%;
  background: var(--acc);
  border: none;
  color: #fff;
  font-family: var(--mono);
  font-size: 13px; font-weight: 700;
  padding: 13px;
  cursor: pointer;
  letter-spacing: 1.5px; text-transform: uppercase;
  transition: background .15s, box-shadow .15s;
}
.btn-primary:hover {
  background: var(--acc2);
  box-shadow: 0 0 20px var(--acc-glow);
}
.btn-primary:disabled { opacity: .4; cursor: not-allowed; }

.setup-url-row {
  display: flex; gap: 8px; margin-bottom: 8px;
}
.setup-url-row .field-input { margin-bottom: 0; flex: 1; }

.btn-sm {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 11px; font-weight: 700;
  padding: 0 14px;
  cursor: pointer;
  letter-spacing: 1px; text-transform: uppercase;
  transition: all .15s;
  white-space: nowrap;
}
.btn-sm:hover { color: var(--text); border-color: var(--border2); }

.setup-hint {
  font-size: 10px; color: var(--text-dim);
  line-height: 1.7; margin-bottom: 20px;
}
.setup-hint a { color: var(--acc2); }
.setup-hint code {
  background: var(--bg3); padding: 1px 5px;
  color: var(--green); font-size: 10px;
}

.setup-err { font-size: 11px; color: var(--red); min-height: 16px; margin-top: 10px; }

/* ─── APP ─────────────────────────────────────────── */
#app { display: none; flex: 1; }
.app-layout { display: flex; height: 100vh; }

/* ─── SIDEBAR ─────────────────────────────────────── */
.sidebar {
  width: 230px; flex-shrink: 0;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
}

.server-hdr {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 13px; font-weight: 700;
  color: var(--text-hi);
  letter-spacing: -.5px;
  display: flex; align-items: center; justify-content: space-between;
  background: linear-gradient(180deg, rgba(99,102,241,.04) 0%, transparent 100%);
}
.server-badge {
  font-size: 9px; color: var(--acc2);
  background: var(--acc-dim);
  border: 1px solid var(--acc);
  padding: 2px 6px; letter-spacing: 1px;
  text-transform: uppercase;
}

.sidebar-scroll { flex: 1; overflow-y: auto; padding-bottom: 8px; }
.sidebar-scroll::-webkit-scrollbar { width: 3px; }
.sidebar-scroll::-webkit-scrollbar-thumb { background: var(--border2); }

.sec-hdr {
  font-size: 9px; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 2px;
  padding: 14px 16px 5px;
  display: flex; align-items: center; justify-content: space-between;
}
.sec-add {
  background: none; border: none;
  color: var(--text-dim); cursor: pointer;
  font-size: 14px; line-height: 1;
  transition: color .15s; padding: 0;
}
.sec-add:hover { color: var(--text); }

.ch-item {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 16px; cursor: pointer;
  font-size: 13px; color: var(--text-dim);
  transition: all .15s;
  border-left: 2px solid transparent;
  user-select: none; position: relative;
}
.ch-item:hover { color: var(--text); background: rgba(255,255,255,.02); }
.ch-item.active {
  color: var(--text-hi); background: var(--acc-dim);
  border-left-color: var(--acc);
}
.ch-item .ch-icon { font-size: 12px; opacity: .6; }
.ch-item.active .ch-icon { opacity: 1; color: var(--acc2); }
.ch-unread {
  margin-left: auto;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--acc2);
}

/* DM items */
.dm-item {
  display: flex; align-items: center; gap: 9px;
  padding: 5px 16px; cursor: pointer;
  font-size: 12px; color: var(--text-dim);
  transition: all .15s;
  border-left: 2px solid transparent;
}
.dm-item:hover { color: var(--text); background: rgba(255,255,255,.02); }
.dm-item.active { color: var(--text-hi); background: var(--acc-dim); border-left-color: var(--acc); }
.dm-av {
  width: 24px; height: 24px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; flex-shrink: 0;
}

/* Voice channel */
.voice-ch {
  margin: 4px 10px;
  border: 1px solid var(--voice-border);
  background: var(--voice-bg);
  border-radius: 2px;
}
.voice-ch-hdr {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 10px; cursor: pointer;
  font-size: 12px; color: var(--green);
  transition: all .15s;
}
.voice-ch-hdr:hover { background: rgba(52,211,153,.05); }
.voice-ch-hdr.joined { background: rgba(52,211,153,.1); }
.voice-members { padding: 0 10px 6px; }
.voice-member {
  display: flex; align-items: center; gap: 6px;
  padding: 3px 0; font-size: 11px; color: var(--green);
}
.voice-member .v-av {
  width: 18px; height: 18px; border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700;
}
.speaking-ring { box-shadow: 0 0 0 2px var(--green); }

/* Self panel */
.self-panel {
  border-top: 1px solid var(--border);
  padding: 10px 12px;
  display: flex; align-items: center; gap: 9px;
  background: var(--bg);
}
.self-av {
  width: 32px; height: 32px; border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; flex-shrink: 0;
}
.self-info { flex: 1; min-width: 0; }
.self-nick { font-size: 13px; color: var(--text-hi); font-weight: 500; }
.self-role { font-size: 10px; }
.self-controls { display: flex; gap: 4px; }
.ctrl-btn {
  width: 28px; height: 28px;
  background: none; border: none;
  color: var(--text-dim); cursor: pointer;
  border-radius: 3px; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.ctrl-btn:hover { background: var(--bg3); color: var(--text); }
.ctrl-btn.muted { color: var(--red) !important; }
.ctrl-btn.deafened { color: var(--red) !important; }

/* ─── CHAT ────────────────────────────────────────── */
.chat-wrap {
  flex: 1; display: flex; flex-direction: column; min-width: 0;
}

.chat-hdr {
  padding: 11px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
  background: var(--bg2); flex-shrink: 0;
}
.chat-hdr-icon { color: var(--acc2); font-size: 15px; }
.chat-hdr-name {
  font-size: 14px; font-weight: 700; color: var(--text-hi);
  letter-spacing: -.3px;
}
.chat-hdr-sep { color: var(--border2); margin: 0 4px; }
.chat-hdr-desc { font-size: 11px; color: var(--text-dim); }
.chat-hdr-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.online-pill {
  font-size: 10px; color: var(--green);
  background: rgba(52,211,153,.1);
  border: 1px solid rgba(52,211,153,.25);
  padding: 2px 8px; letter-spacing: 1px;
}

/* Messages */
.msgs-wrap {
  flex: 1; overflow-y: auto;
  padding: 16px 20px;
  display: flex; flex-direction: column; gap: 1px;
}
.msgs-wrap::-webkit-scrollbar { width: 5px; }
.msgs-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

.day-sep {
  display: flex; align-items: center; gap: 10px;
  margin: 16px 0 8px; font-size: 10px;
  color: var(--text-dim); letter-spacing: 1.5px; text-transform: uppercase;
}
.day-sep::before, .day-sep::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

.msg-grp {
  display: flex; gap: 12px; padding: 5px 6px 3px;
  border-radius: 4px; transition: background .1s;
  position: relative;
}
.msg-grp:hover { background: rgba(255,255,255,.018); }

.msg-av {
  width: 34px; height: 34px; border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; flex-shrink: 0; margin-top: 1px;
}
.msg-body { flex: 1; min-width: 0; }
.msg-meta { display: flex; align-items: baseline; gap: 8px; margin-bottom: 3px; }
.msg-name { font-size: 13px; font-weight: 700; }
.msg-role-badge {
  font-size: 9px; padding: 1px 5px;
  border-radius: 2px; font-weight: 500;
  letter-spacing: .5px; text-transform: uppercase;
}
.msg-ts { font-size: 10px; color: var(--text-dim); }
.msg-txt {
  font-size: 13px; color: var(--text);
  line-height: 1.55; word-break: break-word;
  white-space: pre-wrap; font-family: var(--mono);
}

.msg-cont {
  padding: 2px 6px 1px 52px;
  border-radius: 4px; transition: background .1s;
}
.msg-cont:hover { background: rgba(255,255,255,.018); }
.msg-cont .msg-txt { display: inline; }
.msg-cont-ts {
  font-size: 9px; color: transparent;
  margin-left: 8px; transition: color .15s;
}
.msg-cont:hover .msg-cont-ts { color: var(--text-dim); }

/* system msg */
.sys-msg {
  font-size: 11px; color: var(--text-dim);
  padding: 5px 6px; display: flex; align-items: center; gap: 8px;
  font-style: italic;
}
.sys-icon { font-size: 13px; }

/* empty */
.ch-empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; text-align: center;
}
.ch-empty-icon { font-size: 52px; opacity: .15; }
.ch-empty-name { font-size: 20px; font-weight: 700; color: var(--text-hi); margin-bottom: 4px; }
.ch-empty-sub { font-size: 12px; color: var(--text-dim); line-height: 1.7; }

/* typing */
.typing-bar {
  height: 22px; padding: 0 20px;
  font-size: 11px; color: var(--text-dim);
  display: flex; align-items: center; gap: 6px;
  flex-shrink: 0;
}
.typing-dots span {
  display: inline-block; width: 4px; height: 4px;
  border-radius: 50%; background: var(--acc2);
  animation: tdot 1.2s infinite; margin-right: 2px;
}
.typing-dots span:nth-child(2) { animation-delay: .2s; }
.typing-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes tdot { 0%,60%,100%{transform:translateY(0);opacity:.4} 30%{transform:translateY(-4px);opacity:1} }

/* input */
.input-area { padding: 0 16px 16px; flex-shrink: 0; }
.input-box {
  background: var(--bg3);
  border: 1px solid var(--border);
  display: flex; align-items: flex-end; gap: 0;
  transition: border-color .2s, box-shadow .2s;
}
.input-box:focus-within {
  border-color: var(--border2);
  box-shadow: 0 0 0 1px var(--border2);
}
.msg-ta {
  flex: 1; background: none; border: none;
  color: var(--text-hi); font-family: var(--mono);
  font-size: 13px; padding: 12px 14px;
  outline: none; resize: none;
  max-height: 120px; line-height: 1.45;
}
.msg-ta::placeholder { color: var(--text-dim); }
.send-btn {
  background: none; border: none;
  color: var(--text-dim); cursor: pointer;
  padding: 10px 14px; font-size: 17px;
  transition: color .15s; align-self: flex-end;
  font-family: var(--mono);
}
.send-btn:hover { color: var(--acc2); }

/* ─── VOICE OVERLAY ──────────────────────────────── */
#voice-overlay {
  position: fixed; bottom: 16px; left: 50%;
  transform: translateX(-50%);
  background: var(--bg2);
  border: 1px solid var(--voice-border);
  display: none; align-items: center; gap: 10px;
  padding: 10px 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,.6), 0 0 0 1px rgba(52,211,153,.1);
  z-index: 50; min-width: 320px;
}
#voice-overlay.active { display: flex; }

.vo-status {
  display: flex; align-items: center; gap: 8px;
  flex: 1; font-size: 12px;
}
.vo-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green);
  animation: vopulse 2s infinite;
}
@keyframes vopulse { 0%,100%{box-shadow:0 0 0 0 rgba(52,211,153,.5)} 50%{box-shadow:0 0 0 6px rgba(52,211,153,0)} }
.vo-name { color: var(--green); font-weight: 600; }
.vo-sub { color: var(--text-dim); font-size: 10px; }

.vo-btn {
  background: rgba(255,255,255,.06); border: 1px solid var(--border);
  color: var(--text-dim); cursor: pointer; font-size: 14px;
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  transition: all .15s; border-radius: 3px; font-family: var(--mono);
}
.vo-btn:hover { background: rgba(255,255,255,.1); color: var(--text); }
.vo-btn.on { color: var(--red); border-color: rgba(248,113,113,.3); background: rgba(248,113,113,.07); }
.vo-leave {
  background: rgba(248,113,113,.1); border-color: rgba(248,113,113,.3);
  color: var(--red); font-size: 11px; font-weight: 700;
  padding: 0 10px; width: auto; letter-spacing: 1px; text-transform: uppercase;
}
.vo-leave:hover { background: rgba(248,113,113,.2); }

/* ─── TOAST ──────────────────────────────────────── */
.toast {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--bg3); border: 1px solid var(--border);
  border-left: 3px solid var(--acc);
  padding: 10px 16px; font-size: 12px; color: var(--text);
  opacity: 0; transform: translateY(6px);
  transition: all .2s; pointer-events: none; z-index: 999;
  max-width: 260px;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* ─── MODAL ──────────────────────────────────────── */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.75); display: none;
  align-items: center; justify-content: center;
  z-index: 100; backdrop-filter: blur(3px);
}
.modal-bg.open { display: flex; }
.modal-card {
  background: var(--bg2); border: 1px solid var(--border);
  padding: 28px 32px; width: 340px; position: relative;
}
.modal-card::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--acc), transparent);
}
.modal-ttl { font-size: 13px; font-weight: 700; color: var(--text-hi); margin-bottom: 16px; }
.modal-acts { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.modal-btn {
  background: var(--acc); border: none; color: #fff;
  font-family: var(--mono); font-size: 11px; font-weight: 700;
  padding: 8px 16px; cursor: pointer; letter-spacing: .5px; text-transform: uppercase;
  transition: background .15s;
}
.modal-btn:hover { background: var(--acc2); }
.modal-btn.sec {
  background: var(--bg3); color: var(--text-dim);
  border: 1px solid var(--border);
}
.modal-btn.sec:hover { color: var(--text); }

/* ─── MISC ────────────────────────────────────────── */
.spin { animation: spin 1s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }

.users-panel {
  width: 190px; flex-shrink: 0;
  background: var(--bg2); border-left: 1px solid var(--border);
  overflow-y: auto; padding: 12px 0;
}
.users-panel::-webkit-scrollbar { width: 3px; }
.users-panel::-webkit-scrollbar-thumb { background: var(--border2); }
.up-sec { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; padding: 8px 14px 5px; }
.up-user {
  display: flex; align-items: center; gap: 9px;
  padding: 5px 14px; font-size: 12px; color: var(--text-dim);
  cursor: pointer; transition: all .15s;
}
.up-user:hover { color: var(--text); background: rgba(255,255,255,.025); }
.up-av {
  width: 26px; height: 26px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; flex-shrink: 0;
}
.up-name { flex: 1; }
.up-role-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>
<body>

<!-- ─── SETUP ───────────────────────────────────────────────────────────────── -->
<div id="setup">
<div class="setup-wrap">
  <div class="setup-logo">void<span>.</span>chat</div>
  <div class="setup-tagline">// ambient messenger · firebase + webrtc</div>

  <div class="setup-card">
    <div class="field-label">firebase realtime db url</div>
    <div class="setup-url-row">
      <input class="field-input" id="fb-url" placeholder="https://xxx-default-rtdb.firebaseio.com" />
      <button class="btn-sm" onclick="useDemoMode()">demo</button>
    </div>
    <div class="setup-hint">
      <a href="https://console.firebase.google.com" target="_blank">console.firebase.google.com</a> → create project → realtime database → test mode<br>
      правила: <code>".read": true, ".write": true</code>
    </div>

    <div class="field-label">никнейм</div>
    <input class="field-input" id="nick-inp" maxlength="18" placeholder="null_user" />

    <div class="field-label">роль</div>
    <div class="role-grid" id="role-grid">
      <button class="role-opt selected" data-role="member" onclick="selectRole(this)">
        <div class="role-dot" style="background:#6366f1"></div> участник
      </button>
      <button class="role-opt" data-role="admin" onclick="selectRole(this)">
        <div class="role-dot" style="background:#f472b6"></div> admin
      </button>
      <button class="role-opt" data-role="dev" onclick="selectRole(this)">
        <div class="role-dot" style="background:#34d399"></div> dev
      </button>
      <button class="role-opt" data-role="lurker" onclick="selectRole(this)">
        <div class="role-dot" style="background:#fbbf24"></div> lurker
      </button>
    </div>

    <button class="btn-primary" id="join-btn" onclick="joinChat()">войти в void</button>
    <div class="setup-err" id="setup-err"></div>
  </div>
</div>
</div>

<!-- ─── APP ────────────────────────────────────────────────────────────────── -->
<div id="app">
<div class="app-layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="server-hdr">
      <span>void.chat</span>
      <span class="server-badge" id="conn-badge">live</span>
    </div>

    <div class="sidebar-scroll">
      <!-- Text channels -->
      <div class="sec-hdr">
        каналы
        <button class="sec-add" onclick="openAddChannel()" title="добавить">+</button>
      </div>
      <div id="ch-list"></div>

      <!-- Voice channels -->
      <div class="sec-hdr" style="margin-top:6px">
        голос
        <button class="sec-add" onclick="openAddVoice()" title="добавить">+</button>
      </div>
      <div id="vc-list"></div>

      <!-- DMs -->
      <div class="sec-hdr" style="margin-top:6px">личные</div>
      <div id="dm-list"></div>
    </div>

    <!-- Self panel -->
    <div class="self-panel">
      <div class="self-av" id="self-av"></div>
      <div class="self-info">
        <div class="self-nick" id="self-nick"></div>
        <div class="self-role" id="self-role-label"></div>
      </div>
      <div class="self-controls">
        <button class="ctrl-btn" id="mic-btn" onclick="toggleMic()" title="мик">🎤</button>
        <button class="ctrl-btn" id="deaf-btn" onclick="toggleDeaf()" title="звук">🔊</button>
      </div>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-wrap">
    <div class="chat-hdr">
      <span class="chat-hdr-icon" id="hdr-icon">#</span>
      <span class="chat-hdr-name" id="hdr-name">general</span>
      <span class="chat-hdr-sep">·</span>
      <span class="chat-hdr-desc" id="hdr-desc"></span>
      <div class="chat-hdr-right">
        <span class="online-pill" id="online-count"></span>
      </div>
    </div>

    <div class="msgs-wrap" id="msgs"></div>
    <div class="typing-bar" id="typing-bar"></div>

    <div class="input-area">
      <div class="input-box">
        <textarea class="msg-ta" id="msg-ta" rows="1"
          placeholder="сообщение..."
          onkeydown="onKey(event)" oninput="onInput()"></textarea>
        <button class="send-btn" onclick="sendMsg()">⏎</button>
      </div>
    </div>
  </div>

  <!-- USERS PANEL -->
  <div class="users-panel" id="users-panel"></div>
</div>
</div>

<!-- VOICE OVERLAY -->
<div id="voice-overlay">
  <div class="vo-status">
    <div class="vo-dot"></div>
    <div>
      <div class="vo-name" id="vo-ch-name">voice</div>
      <div class="vo-sub" id="vo-peers">только ты</div>
    </div>
  </div>
  <button class="vo-btn" id="vo-mic" onclick="toggleMic()" title="мик">🎤</button>
  <button class="vo-btn" id="vo-deaf" onclick="toggleDeaf()" title="звук">🔊</button>
  <button class="vo-btn vo-leave" onclick="leaveVoice()">покинуть</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- MODAL -->
<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-card">
    <div class="modal-ttl" id="modal-ttl"></div>
    <div class="field-label" id="modal-lbl">название</div>
    <input class="field-input" id="modal-inp" style="margin-bottom:0" onkeydown="if(event.key==='Enter')modalOk()" />
    <div class="modal-acts">
      <button class="modal-btn sec" onclick="closeModal()">отмена</button>
      <button class="modal-btn" onclick="modalOk()">создать</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  CONFIG & STATE
// ══════════════════════════════════════════════════════
const ROLES = {
  member:  { label: 'member', color: '#6366f1', bg: 'rgba(99,102,241,.15)' },
  admin:   { label: 'admin',  color: '#f472b6', bg: 'rgba(244,114,182,.15)' },
  dev:     { label: 'dev',    color: '#34d399', bg: 'rgba(52,211,153,.15)' },
  lurker:  { label: 'lurker', color: '#fbbf24', bg: 'rgba(251,191,36,.15)' },
};
const COLORS = ['#6366f1','#34d399','#f472b6','#fbbf24','#60a5fa','#fb923c','#a78bfa','#2dd4bf'];
const DEFAULT_CHANNELS = ['general','random','dev','music'];
const DEFAULT_VOICES   = ['voice-1','lounge'];

let DB_URL = null;
let DEMO = false;
let me = null; // {uid, name, color, role}
let curView = { type: 'channel', id: 'general' }; // type: channel|dm|voice
let channels = [...DEFAULT_CHANNELS];
let voiceChannels = [...DEFAULT_VOICES];

// messages: {channelId: [{uid,name,color,role,text,ts,key}]}
let msgs = {};
// users online: {uid: {name,color,role,lastSeen,uid}}
let users = {};
// typing: {channelId: {uid: {name,ts}}}
let typing = {};
// voice rooms: {channelId: {uid: {name,color}}}
let voiceRooms = {};

// demo storage
let _demoMsgs = {};
let _demoUsers = {};

// webrtc
let localStream = null;
let peers = {}; // uid -> RTCPeerConnection
let inVoiceChannel = null;
let micMuted = false;
let deafened = false;

// polling
let polls = [];
let knownKeys = {}; // channelId -> Set

// ══════════════════════════════════════════════════════
//  SETUP
// ══════════════════════════════════════════════════════
let selectedRole = 'member';
function selectRole(el) {
  document.querySelectorAll('.role-opt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  selectedRole = el.dataset.role;
}

function useDemoMode() {
  DEMO = true;
  DB_URL = null;
  document.getElementById('fb-url').value = '';
  document.getElementById('fb-url').disabled = true;
  document.getElementById('fb-url').placeholder = 'demo mode (local only)';
  showToast('demo mode: только эта вкладка');
}

async function joinChat() {
  const nick = document.getElementById('nick-inp').value.trim();
  const url  = document.getElementById('fb-url').value.trim().replace(/\/$/,'');

  if (!nick || nick.length < 2) return setErr('никнейм минимум 2 символа');
  if (!DEMO && (!url || !url.includes('firebaseio.com'))) return setErr('введи url firebase или нажми demo');

  if (!DEMO) DB_URL = url;

  const uid   = 'u' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  const color = COLORS[Math.floor(Math.random() * COLORS.length)];
  me = { uid, name: nick, color, role: selectedRole };

  document.getElementById('join-btn').textContent = 'подключаем...';
  document.getElementById('join-btn').disabled = true;

  try {
    if (!DEMO) {
      await fbSet(`users/${uid}`, { ...me, lastSeen: Date.now() });
      for (const ch of DEFAULT_CHANNELS) await fbSet(`channels/text/${ch}`, { name: ch });
      for (const vc of DEFAULT_VOICES)   await fbSet(`channels/voice/${vc}`, { name: vc });
    } else {
      _demoUsers[uid] = { ...me, lastSeen: Date.now() };
    }
    enterApp();
  } catch(e) {
    setErr('ошибка firebase: ' + e.message);
    document.getElementById('join-btn').textContent = 'войти в void';
    document.getElementById('join-btn').disabled = false;
  }
}

function setErr(t) { document.getElementById('setup-err').textContent = t; }

// ══════════════════════════════════════════════════════
//  FIREBASE REST
// ══════════════════════════════════════════════════════
async function fbGet(p)      { const r = await fetch(`${DB_URL}/${p}.json`); return r.json(); }
async function fbSet(p,d)    { await fetch(`${DB_URL}/${p}.json`, {method:'PUT',  body:JSON.stringify(d)}); }
async function fbPush(p,d)   { const r = await fetch(`${DB_URL}/${p}.json`, {method:'POST', body:JSON.stringify(d)}); return r.json(); }
async function fbUpdate(p,d) { await fetch(`${DB_URL}/${p}.json`, {method:'PATCH',body:JSON.stringify(d)}); }
async function fbDel(p)      { await fetch(`${DB_URL}/${p}.json`, {method:'DELETE'}); }

// ══════════════════════════════════════════════════════
//  APP INIT
// ══════════════════════════════════════════════════════
function enterApp() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  // self panel
  const av = document.getElementById('self-av');
  av.textContent = me.name[0].toUpperCase();
  av.style.background = me.color + '28';
  av.style.color = me.color;
  document.getElementById('self-nick').textContent = me.name;
  const rd = ROLES[me.role];
  document.getElementById('self-role-label').textContent = rd.label;
  document.getElementById('self-role-label').style.color = rd.color;

  // demo users
  if (DEMO) _demoUsers[me.uid] = { ...me, lastSeen: Date.now() };

  renderChannels();
  renderVoiceChannels();
  switchTo('channel', 'general');

  if (!DEMO) {
    startPolling();
    window.addEventListener('beforeunload', cleanupUser);
  } else {
    document.getElementById('conn-badge').textContent = 'demo';
    document.getElementById('conn-badge').style.color = 'var(--yellow)';
  }
}

async function cleanupUser() {
  try {
    await fbDel(`users/${me.uid}`);
    await fbDel(`voice/${inVoiceChannel}/${me.uid}`);
    await fbDel(`signaling/${me.uid}`);
  } catch(e){}
}

// ══════════════════════════════════════════════════════
//  POLLING
// ══════════════════════════════════════════════════════
function startPolling() {
  polls.push(setInterval(pollMsgs,    1500));
  polls.push(setInterval(pollUsers,   3000));
  polls.push(setInterval(pollChans,   6000));
  polls.push(setInterval(pollVoice,   2000));
  polls.push(setInterval(pollTyping,  1500));
  polls.push(setInterval(pollSignal,  800));
  polls.push(setInterval(heartbeat,   8000));
  pollMsgs(); pollUsers(); pollVoice();
}

async function heartbeat() {
  if (me) await fbSet(`users/${me.uid}/lastSeen`, Date.now());
}

async function pollMsgs() {
  const id = viewId();
  if (!id || curView.type !== 'channel') return;
  try {
    const data = await fbGet(`msgs/${id}`);
    if (!data) return;
    if (!knownKeys[id]) knownKeys[id] = new Set();
    if (!msgs[id]) msgs[id] = [];
    let fresh = false;
    for (const [k, m] of Object.entries(data)) {
      if (!knownKeys[id].has(k)) {
        knownKeys[id].add(k);
        msgs[id].push({...m, key: k});
        fresh = true;
      }
    }
    if (fresh) { msgs[id].sort((a,b)=>a.ts-b.ts); renderMsgs(); }
  } catch(e) {}
}

async function pollUsers() {
  try {
    const data = await fbGet('users');
    users = {};
    const now = Date.now();
    if (data) {
      for (const [uid, u] of Object.entries(data)) {
        if (now - u.lastSeen < 35000) users[uid] = u;
      }
    }
    renderUsersPanel();
    renderOnline();
  } catch(e) {}
}

async function pollChans() {
  try {
    const tc = await fbGet('channels/text');
    const vc = await fbGet('channels/voice');
    let changed = false;
    if (tc) for (const id of Object.keys(tc)) { if (!channels.includes(id)) { channels.push(id); changed = true; } }
    if (vc) for (const id of Object.keys(vc)) { if (!voiceChannels.includes(id)) { voiceChannels.push(id); changed = true; } }
    if (changed) { renderChannels(); renderVoiceChannels(); }
  } catch(e) {}
}

async function pollTyping() {
  const id = viewId();
  if (!id || curView.type !== 'channel') return;
  try {
    const data = await fbGet(`typing/${id}`);
    typing[id] = data || {};
    renderTyping();
  } catch(e) {}
}

async function pollVoice() {
  if (!inVoiceChannel) return;
  try {
    const data = await fbGet(`voice/${inVoiceChannel}`);
    voiceRooms[inVoiceChannel] = data || {};
    renderVoiceMembers(inVoiceChannel);
    // check for new peers
    if (data) {
      for (const uid of Object.keys(data)) {
        if (uid !== me.uid && !peers[uid]) {
          // i'm older if my uid < their uid (arbitrary tiebreak for offer/answer)
          if (me.uid < uid) await createOffer(uid);
        }
      }
    }
    updateVoiceOverlay();
  } catch(e) {}
}

// ══════════════════════════════════════════════════════
//  CHANNELS & NAVIGATION
// ══════════════════════════════════════════════════════
function renderChannels() {
  const el = document.getElementById('ch-list');
  el.innerHTML = '';
  for (const id of channels) {
    const d = document.createElement('div');
    d.className = 'ch-item' + (curView.type==='channel' && curView.id===id ? ' active' : '');
    d.innerHTML = `<span class="ch-icon">#</span>${esc(id)}`;
    d.onclick = () => switchTo('channel', id);
    el.appendChild(d);
  }
}

function renderVoiceChannels() {
  const el = document.getElementById('vc-list');
  el.innerHTML = '';
  for (const id of voiceChannels) {
    const wr = document.createElement('div');
    wr.className = 'voice-ch';

    const hdr = document.createElement('div');
    hdr.className = 'voice-ch-hdr' + (inVoiceChannel === id ? ' joined' : '');
    hdr.id = `vc-hdr-${id}`;
    hdr.innerHTML = `<span>🔊</span><span>${esc(id)}</span>`;
    hdr.onclick = () => joinVoice(id);

    const members = document.createElement('div');
    members.className = 'voice-members';
    members.id = `vc-members-${id}`;

    wr.appendChild(hdr);
    wr.appendChild(members);
    el.appendChild(wr);
  }
}

function renderVoiceMembers(chId) {
  const el = document.getElementById(`vc-members-${chId}`);
  if (!el) return;
  el.innerHTML = '';
  const room = voiceRooms[chId] || {};
  for (const [uid, u] of Object.entries(room)) {
    const d = document.createElement('div');
    d.className = 'voice-member';
    d.innerHTML = `<div class="v-av" style="background:${u.color}28;color:${u.color}">${u.name[0].toUpperCase()}</div>${esc(u.name)}`;
    el.appendChild(d);
  }
}

async function switchTo(type, id) {
  curView = { type, id };

  // update active states
  document.querySelectorAll('.ch-item').forEach(e => {
    e.classList.toggle('active', type==='channel' && e.textContent.trim()===id);
  });
  document.querySelectorAll('.dm-item').forEach(e => {
    e.classList.toggle('active', type==='dm' && e.dataset.uid===id);
  });

  // header
  const hdrIcon = document.getElementById('hdr-icon');
  const hdrName = document.getElementById('hdr-name');
  const hdrDesc = document.getElementById('hdr-desc');
  const ta = document.getElementById('msg-ta');

  if (type === 'channel') {
    hdrIcon.textContent = '#';
    hdrName.textContent = id;
    hdrDesc.textContent = '';
    ta.placeholder = `сообщение в #${id}...`;
  } else if (type === 'dm') {
    const u = users[id] || _demoUsers[id] || {};
    hdrIcon.textContent = '✉';
    hdrName.textContent = u.name || id;
    hdrDesc.textContent = 'личные сообщения';
    ta.placeholder = `сообщение ${u.name || id}...`;
  }

  // clear & load messages
  if (!msgs[id]) msgs[id] = [];
  if (!knownKeys[id]) knownKeys[id] = new Set();

  const msgsEl = document.getElementById('msgs');
  msgsEl.innerHTML = '';

  if (DEMO) {
    msgs[id] = _demoMsgs[id] ? [..._demoMsgs[id]] : [];
    renderMsgs();
  } else {
    msgsEl.innerHTML = '<div class="ch-empty" style="flex:1"><div style="color:var(--text-dim);font-size:12px">загружаем...</div></div>';
    const path = type === 'dm' ? `dms/${dmKey(id)}/msgs` : `msgs/${id}`;
    try {
      const data = await fbGet(path);
      msgsEl.innerHTML = '';
      knownKeys[id] = new Set();
      msgs[id] = [];
      if (data) {
        for (const [k, m] of Object.entries(data)) {
          knownKeys[id].add(k);
          msgs[id].push({...m, key:k});
        }
        msgs[id].sort((a,b)=>a.ts-b.ts);
      }
    } catch(e) { msgsEl.innerHTML = ''; }
    renderMsgs();
    pollTyping();
  }
  renderOnline();
}

function dmKey(uid) {
  return [me.uid, uid].sort().join('_');
}

function viewId() { return curView.id; }

// ══════════════════════════════════════════════════════
//  RENDER MESSAGES
// ══════════════════════════════════════════════════════
function renderMsgs() {
  const el = document.getElementById('msgs');
  const atBottom = el.scrollHeight - el.clientHeight - el.scrollTop < 80;
  const id = viewId();
  const list = msgs[id] || [];

  if (!list.length) {
    el.innerHTML = `<div class="ch-empty">
      <div class="ch-empty-icon">${curView.type==='dm'?'✉':'#'}</div>
      <div class="ch-empty-name">${curView.type==='dm' ? 'dm' : id}</div>
      <div class="ch-empty-sub">первое сообщение в этом месте.<br>скажи что-нибудь.</div>
    </div>`;
    return;
  }

  el.innerHTML = '';
  let prevAuthor = null, prevTs = 0;

  for (let i = 0; i < list.length; i++) {
    const m = list[i];
    const ts = new Date(m.ts);
    const timeStr = ts.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});

    if (i===0 || new Date(list[i-1].ts).toDateString()!==ts.toDateString()) {
      const sep = document.createElement('div');
      sep.className = 'day-sep';
      sep.textContent = isToday(ts) ? 'сегодня' : ts.toLocaleDateString('ru');
      el.appendChild(sep);
      prevAuthor = null;
    }

    const same = prevAuthor === m.uid && (m.ts - prevTs) < 300000;
    const role = ROLES[m.role] || ROLES.member;

    if (same) {
      const d = document.createElement('div');
      d.className = 'msg-cont';
      d.innerHTML = `<span class="msg-txt">${escMsg(m.text)}</span><span class="msg-cont-ts">${timeStr}</span>`;
      el.appendChild(d);
    } else {
      const d = document.createElement('div');
      d.className = 'msg-grp';
      d.innerHTML = `
        <div class="msg-av" style="background:${m.color}22;color:${m.color}">${(m.name||'?')[0].toUpperCase()}</div>
        <div class="msg-body">
          <div class="msg-meta">
            <span class="msg-name" style="color:${m.color}">${esc(m.name)}</span>
            <span class="msg-role-badge" style="background:${role.bg};color:${role.color}">${role.label}</span>
            <span class="msg-ts">${timeStr}</span>
          </div>
          <div class="msg-txt">${escMsg(m.text)}</div>
        </div>
      `;
      el.appendChild(d);
    }
    prevAuthor = m.uid; prevTs = m.ts;
  }

  if (atBottom) el.scrollTop = el.scrollHeight;
}

function isToday(d) {
  const n = new Date();
  return d.getDate()===n.getDate() && d.getMonth()===n.getMonth() && d.getFullYear()===n.getFullYear();
}

// ══════════════════════════════════════════════════════
//  SEND MESSAGE
// ══════════════════════════════════════════════════════
async function sendMsg() {
  const ta = document.getElementById('msg-ta');
  const text = ta.value.trim();
  if (!text) return;
  ta.value = ''; ta.style.height = 'auto';

  const id = viewId();
  const m = { uid: me.uid, name: me.name, color: me.color, role: me.role, text, ts: Date.now() };

  if (DEMO) {
    if (!_demoMsgs[id]) _demoMsgs[id] = [];
    _demoMsgs[id].push(m);
    msgs[id] = [..._demoMsgs[id]];
    renderMsgs();
    return;
  }

  const path = curView.type==='dm' ? `dms/${dmKey(id)}/msgs` : `msgs/${id}`;
  try {
    await fbPush(path, m);
    await fbDel(`typing/${id}/${me.uid}`);
  } catch(e) { showToast('ошибка отправки'); }
}

// ══════════════════════════════════════════════════════
//  TYPING
// ══════════════════════════════════════════════════════
let myTypTimer = null;

function onInput() {
  const ta = document.getElementById('msg-ta');
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
  if (DEMO) return;
  if (myTypTimer) clearTimeout(myTypTimer);
  fbSet(`typing/${viewId()}/${me.uid}`, { name: me.name, ts: Date.now() }).catch(()=>{});
  myTypTimer = setTimeout(() => fbDel(`typing/${viewId()}/${me.uid}`).catch(()=>{}), 3000);
}

function renderTyping() {
  const el = document.getElementById('typing-bar');
  const now = Date.now();
  const t = typing[viewId()] || {};
  const names = Object.values(t)
    .filter(x => x.uid !== me.uid && now - x.ts < 5000)
    .map(x => x.name);
  if (!names.length) { el.innerHTML = ''; return; }
  el.innerHTML = `<span class="typing-dots"><span></span><span></span><span></span></span>
    <span style="color:var(--acc2)">${names.join(', ')}</span>
    <span> печатает${names.length>1?'т':''}</span>`;
}

function onKey(e) {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

// ══════════════════════════════════════════════════════
//  USERS PANEL & ONLINE
// ══════════════════════════════════════════════════════
function renderUsersPanel() {
  const el = document.getElementById('users-panel');
  el.innerHTML = '';
  const usrs = DEMO ? _demoUsers : users;

  const byRole = {};
  for (const [uid, u] of Object.entries(usrs)) {
    const r = u.role || 'member';
    if (!byRole[r]) byRole[r] = [];
    byRole[r].push({uid, ...u});
  }

  for (const [role, list] of Object.entries(byRole)) {
    const rd = ROLES[role] || ROLES.member;
    const sec = document.createElement('div');
    sec.className = 'up-sec';
    sec.textContent = rd.label + ' — ' + list.length;
    el.appendChild(sec);

    for (const u of list) {
      const d = document.createElement('div');
      d.className = 'up-user';
      d.innerHTML = `
        <div class="up-av" style="background:${u.color}28;color:${u.color}">${u.name[0].toUpperCase()}</div>
        <span class="up-name">${esc(u.name)}${u.uid===me.uid?' <span style="color:var(--text-dim)">(ты)</span>':''}</span>
        <div class="up-role-dot" style="background:${rd.color}"></div>
      `;
      if (u.uid !== me.uid) d.onclick = () => openDM(u.uid);
      el.appendChild(d);
    }
  }
}

function renderOnline() {
  const usrs = DEMO ? _demoUsers : users;
  const n = Object.keys(usrs).length;
  document.getElementById('online-count').textContent = n + ' онлайн';
}

function openDM(uid) {
  const u = (DEMO ? _demoUsers : users)[uid];
  if (!u) return;
  // add DM to list if not present
  const dmList = document.getElementById('dm-list');
  if (!document.querySelector(`.dm-item[data-uid="${uid}"]`)) {
    const d = document.createElement('div');
    d.className = 'dm-item';
    d.dataset.uid = uid;
    d.innerHTML = `<div class="dm-av" style="background:${u.color}28;color:${u.color}">${u.name[0].toUpperCase()}</div>${esc(u.name)}`;
    d.onclick = () => switchTo('dm', uid);
    dmList.appendChild(d);
  }
  switchTo('dm', uid);
}

// ══════════════════════════════════════════════════════
//  VOICE — WebRTC MESH
// ══════════════════════════════════════════════════════
const RTC_CONFIG = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

async function joinVoice(id) {
  if (inVoiceChannel === id) { leaveVoice(); return; }
  if (inVoiceChannel) await leaveVoice(false);

  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch(e) {
    showToast('нет доступа к микрофону: ' + e.message);
    return;
  }

  inVoiceChannel = id;
  if (!voiceRooms[id]) voiceRooms[id] = {};

  if (!DEMO) {
    await fbSet(`voice/${id}/${me.uid}`, { name: me.name, color: me.color, uid: me.uid });
  } else {
    if (!voiceRooms[id]) voiceRooms[id] = {};
    voiceRooms[id][me.uid] = { name: me.name, color: me.color, uid: me.uid };
  }

  document.getElementById(`vc-hdr-${id}`)?.classList.add('joined');
  document.getElementById('voice-overlay').classList.add('active');
  document.getElementById('vo-ch-name').textContent = id;
  updateVoiceOverlay();
  renderVoiceMembers(id);
  showToast(`joined #${id}`);
}

async function leaveVoice(rerender = true) {
  if (!inVoiceChannel) return;
  const id = inVoiceChannel;

  // close all peer connections
  for (const [uid, pc] of Object.entries(peers)) {
    pc.close(); delete peers[uid];
  }
  // stop audio
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  // remove audio elements
  document.querySelectorAll('[data-voice-uid]').forEach(el => el.remove());

  if (!DEMO) {
    await fbDel(`voice/${id}/${me.uid}`);
    await fbDel(`signaling/${me.uid}`);
  } else {
    if (voiceRooms[id]) delete voiceRooms[id][me.uid];
  }

  document.getElementById(`vc-hdr-${id}`)?.classList.remove('joined');
  document.getElementById('voice-overlay').classList.remove('active');
  inVoiceChannel = null;
  if (rerender) renderVoiceMembers(id);
}

async function createOffer(remoteUid) {
  const pc = createPeerConnection(remoteUid);
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  if (!DEMO) {
    await fbSet(`signaling/${remoteUid}/from_${me.uid}`, {
      type: 'offer', sdp: offer.sdp, from: me.uid
    });
  }
}

function createPeerConnection(remoteUid) {
  if (peers[remoteUid]) { peers[remoteUid].close(); }
  const pc = new RTCPeerConnection(RTC_CONFIG);
  peers[remoteUid] = pc;

  // add local tracks
  if (localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  // ICE candidates
  pc.onicecandidate = async e => {
    if (e.candidate && !DEMO) {
      await fbPush(`signaling/${remoteUid}/candidates_from_${me.uid}`, {
        candidate: e.candidate.candidate,
        sdpMid: e.candidate.sdpMid,
        sdpMLineIndex: e.candidate.sdpMLineIndex,
        from: me.uid
      });
    }
  };

  // remote audio
  pc.ontrack = e => {
    let audio = document.querySelector(`[data-voice-uid="${remoteUid}"]`);
    if (!audio) {
      audio = document.createElement('audio');
      audio.setAttribute('data-voice-uid', remoteUid);
      audio.autoplay = true;
      document.body.appendChild(audio);
    }
    audio.srcObject = e.streams[0];
    if (deafened) audio.muted = true;
  };

  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
      delete peers[remoteUid];
    }
  };

  return pc;
}

async function pollSignal() {
  if (!inVoiceChannel || DEMO) return;
  try {
    const data = await fbGet(`signaling/${me.uid}`);
    if (!data) return;
    for (const [k, sig] of Object.entries(data)) {
      if (sig.type === 'offer') await handleOffer(sig);
      else if (sig.type === 'answer') await handleAnswer(sig);
      await fbDel(`signaling/${me.uid}/${k}`);
    }
  } catch(e){}
}

async function handleOffer(sig) {
  const remoteUid = sig.from;
  const pc = createPeerConnection(remoteUid);
  await pc.setRemoteDescription({ type: 'offer', sdp: sig.sdp });
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await fbSet(`signaling/${remoteUid}/from_${me.uid}`, {
    type: 'answer', sdp: answer.sdp, from: me.uid
  });
  // apply queued candidates
  const cands = await fbGet(`signaling/${me.uid}/candidates_from_${remoteUid}`);
  if (cands) {
    for (const c of Object.values(cands)) {
      try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch(e){}
    }
    await fbDel(`signaling/${me.uid}/candidates_from_${remoteUid}`);
  }
}

async function handleAnswer(sig) {
  const pc = peers[sig.from];
  if (!pc) return;
  try { await pc.setRemoteDescription({ type: 'answer', sdp: sig.sdp }); } catch(e){}
}

function updateVoiceOverlay() {
  const room = voiceRooms[inVoiceChannel] || {};
  const others = Object.values(room).filter(u => u.uid !== me.uid);
  document.getElementById('vo-peers').textContent =
    others.length ? others.map(u=>u.name).join(', ') : 'только ты';
}

function toggleMic() {
  micMuted = !micMuted;
  if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = !micMuted);
  const label = micMuted ? '🔇' : '🎤';
  document.getElementById('mic-btn').textContent = label;
  document.getElementById('vo-mic').textContent = label;
  document.getElementById('mic-btn').classList.toggle('muted', micMuted);
  document.getElementById('vo-mic').classList.toggle('on', micMuted);
}

function toggleDeaf() {
  deafened = !deafened;
  document.querySelectorAll('[data-voice-uid]').forEach(a => a.muted = deafened);
  const label = deafened ? '🔕' : '🔊';
  document.getElementById('deaf-btn').textContent = label;
  document.getElementById('vo-deaf').textContent = label;
  document.getElementById('deaf-btn').classList.toggle('deafened', deafened);
  document.getElementById('vo-deaf').classList.toggle('on', deafened);
}

//  CHANNELS MODAL
// ══════════════════════════════════════════════════════
let modalAction = null;

function openAddChannel() {
  modalAction = 'addChannel';
  document.getElementById('modal-ttl').textContent = '// новый текстовый канал';
  document.getElementById('modal-lbl').textContent = 'название (только строчные)';
  document.getElementById('modal-inp').value = '';
  document.getElementById('modal-inp').placeholder = 'my-channel';
  document.getElementById('modal').classList.add('open');
  document.getElementById('modal-inp').focus();
}

function openAddVoice() {
  modalAction = 'addVoice';
  document.getElementById('modal-ttl').textContent = '// новый голосовой канал';
  document.getElementById('modal-lbl').textContent = 'название';
  document.getElementById('modal-inp').value = '';
  document.getElementById('modal-inp').placeholder = 'room-2';
  document.getElementById('modal').classList.add('open');
  document.getElementById('modal-inp').focus();
}

async function modalOk() {
  let name = document.getElementById('modal-inp').value.trim()
    .toLowerCase().replace(/[^a-zа-яё0-9_-]/gi, '-').replace(/-+/g,'-').replace(/^-|-$/g,'');
  if (!name) return;
  closeModal();

  if (modalAction === 'addChannel') {
    if (!channels.includes(name)) {
      channels.push(name);
      if (!DEMO) await fbSet(`channels/text/${name}`, { name });
      renderChannels();
      switchTo('channel', name);
    } else switchTo('channel', name);
  } else if (modalAction === 'addVoice') {
    if (!voiceChannels.includes(name)) {
      voiceChannels.push(name);
      if (!DEMO) await fbSet(`channels/voice/${name}`, { name });
      renderVoiceChannels();
    }
    joinVoice(name);
  }
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

// ══════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escMsg(s) {
  return esc(s).replace(/\n/g,'<br>');
}

let toastT = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  if (toastT) clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 3000);
}

// nickname input enter
document.getElementById('nick-inp').addEventListener('keydown', e => {
  if (e.key === 'Enter') joinChat();
});
